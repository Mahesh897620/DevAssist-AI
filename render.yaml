services:
  - type: web
    name: devassist-ai
    env: python
    buildCommand: ./build.sh
    startCommand: cd Backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 8000
      - key: DATABASE_URL
        value: sqlite:///./devassist.db
      - key: GROQ_API_KEY
        sync: false
      - key: HINDSIGHT_API_KEY
        sync: false
